<!DOCTYPE html>
<html>
<head>
    <title>Test Container Repair Connection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .status { font-weight: 600; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Container Repair Data Connection Test</h1>
    <div id="test-result"></div>
    
    <h2>Container Repair Report Table</h2>
    <table id="repair-container-table">
        <thead>
            <tr>
                <td>Chassi No.</td>
                <td>Container</td>
                <td>Size</td>
                <td>Container Issue</td>
                <td>Date Reported</td>
                <td>Status</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="6" style="text-align: center; padding: 20px; color: #666;">
                    Loading container data...
                </td>
            </tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase (use your actual credentials)
        const supabaseUrl = 'https://your-project.supabase.co';
        const supabaseKey = 'your-anon-key';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Test function to load container data
        async function testContainerDataLoad() {
            const resultDiv = document.getElementById('test-result');
            const tbody = document.querySelector('#repair-container-table tbody');
            
            try {
                // Load container data from containers table
                const { data: containerData, error: containerError } = await supabaseClient
                    .from('containers')
                    .select('*')
                    .order('container', { ascending: true });
                    
                if (containerError) {
                    throw containerError;
                }
                
                if (!containerData || containerData.length === 0) {
                    resultDiv.innerHTML = '<div class="test-result success">✓ Connection successful, but no container data found</div>';
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 20px; color: #666;">
                                No Container Vehicles Found For The Selected Plant.
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                resultDiv.innerHTML = `<div class="test-result success">✓ Successfully loaded ${containerData.length} container records</div>`;
                
                // Populate container table
                tbody.innerHTML = containerData.map(container => {
                    const statusColor = {
                        'OPERATIONAL': 'green',
                        'OPERATIONAL/HUSTLING': 'blue',
                        'DOWN': 'red',
                        'Down': 'red',
                        'down': 'red'
                    }[container.status] || 'black';

                    return `
                        <tr>
                            <td>${container.chassi_no || '-'}</td>
                            <td>${container.container || '-'}</td>
                            <td>${container.size || '-'}</td>
                            <td>${container.container_issue || '-'}</td>
                            <td>${container.date_reported || '-'}</td>
                            <td><span class="status" style="color: ${statusColor};">${container.status || 'Active'}</span></td>
                        </tr>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading container data:', error);
                resultDiv.innerHTML = `<div class="test-result error">✗ Error: ${error.message}</div>`;
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 20px; color: #666;">
                            Error loading container data.
                        </td>
                    </tr>
                `;
            }
        }

        // Run test when page loads
        document.addEventListener('DOMContentLoaded', testContainerDataLoad);
    </script>
</body>
</html>
